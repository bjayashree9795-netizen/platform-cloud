---
- name: Tenant Infrastructure PreCheck
  hosts: localhost
  gather_facts: false

  tasks:

    - name: Show Environment Value
      debug:
        var: tenant_environment

    - name: Show Region Value
      debug:
        var: region

    - name: Verify Region
      assert:
        that:
          - region in allowed_regions
        fail_msg: "Unsupported Region"

    - name: Verify Tenant Environment
      assert:
        that:
          - tenant_environment in allowed_environments
        fail_msg: "Unsupported Environment"

    - name: Infrastructure PreCheck Passed
      debug:
        msg: "Infrastructure is ready for provisioning"

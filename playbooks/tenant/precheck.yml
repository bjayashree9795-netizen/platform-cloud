---
- name: Tenant Infrastructure PreCheck
  hosts: localhost
  gather_facts: false

  tasks:

    - name: Show Environment Value
      debug:
        var: environment

    - name: Show Region Value
      debug:
        var: region

    - name: Verify Region
      assert:
        that:
          - region in ['CHN-SPD-MAA01', 'MUM-PNL-BOM01', 'MUM-MPE-BOM02']
        fail_msg: "Unsupported Region"

    - name: Verify Environment
      vars:
        valid_envs:
          - development
          - testing
          - uat
          - production

      assert:
        that:
          - environment | lower in valid_envs
        fail_msg: "Invalid Environment"

    - name: Infrastructure PreCheck Passed
      debug:
        msg: "Infrastructure is ready for provisioning"

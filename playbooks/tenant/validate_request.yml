---
- name: Build and Validate Tenant Service Request

  hosts: localhost
  gather_facts: false

  vars:

    service_request:

      request:

        id: "REQ-{{ lookup('pipe','date +%Y%m%d%H%M%S') }}"

        service: "Tenant"

        operation: "Create"

        requested_by: "{{ requested_by }}"

      tenant:

        name: "{{ tenant_name }}"

        description: "{{ tenant_description }}"

        business_unit: "{{ business_unit }}"

        project_name: "{{ project_name }}"

        region: "{{ region }}"

      services:

        internet: "{{ internet_access == 'Yes' }}"

        firewall: "{{ firewall_required == 'Yes' }}"

        loadbalancer: "{{ lb_required == 'Yes' }}"

        monitoring: "{{ monitoring_required == 'Yes' }}"

      metadata:

        owner_email: "{{ owner_email }}"

        status: "REQUESTED"

  tasks:

    - name: Display Complete Service Request
      debug:
        var: service_request

    - name: Validate Tenant Name
      assert:
        that:
          - service_request.tenant.name | length > 2
        fail_msg: "Tenant Name cannot be empty"

    - name: Validate Region
      assert:
        that:
          - service_request.tenant.region in allowed_regions
        fail_msg: "Unsupported Region"

    - name: Validation Successful
      debug:
        msg: "Tenant Service Request validated successfully."

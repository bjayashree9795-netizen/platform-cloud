---
service:

  name: Tenant

  version: 1.0

  description: Tenant Lifecycle Service

request:

  mandatory:

    - tenant_name
    - business_unit
    - project_name
    - region
    - requested_by
    - owner_email

  optional:

    - tenant_description

services:

  internet:

    type: boolean

    default: false

  firewall:

    type: boolean

    default: false

  loadbalancer:

    type: boolean

    default: false

  monitoring:

    type: boolean

    default: true

lifecycle:

  validate:

    playbook: playbooks/tenant/validate_request.yml

  precheck:

    playbook: playbooks/tenant/precheck.yml

  provision:

    playbook: playbooks/tenant/provision.yml

  rollback:

    playbook: playbooks/tenant/rollback.yml

  postcheck:

    playbook: playbooks/tenant/postcheck.yml

  inventory:

    playbook: playbooks/tenant/inventory.yml

  monitoring:

    playbook: playbooks/tenant/monitoring.yml

  activate:

    playbook: playbooks/tenant/activate.yml
